<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>

<nav class="navbar navbar-light bg-white border-bottom px-4">
  <span class="navbar-brand mb-0 h6" id="nav-username">Chargement…</span>
  <button class="btn btn-sm btn-outline-secondary" id="btn-logout">Déconnexion</button>
</nav>

<div class="container mt-5">
  <div id="alert" class="alert alert-danger d-none"></div>

  <div class="card shadow-sm" style="max-width:460px">
    <div class="card-body p-4">
      <h6 class="card-title mb-3">Mon compte</h6>
      <dl class="row mb-0" id="user-info">
        <dd class="col-12 text-muted">Chargement…</dd>
      </dl>
    </div>
  </div>
</div>

<script>
  const API = '../api';

  const token = localStorage.getItem('jwt');
  if (!token) window.location = 'login.html';

  // Pré-rempli depuis le localStorage (évite un flash)
  const cached = JSON.parse(localStorage.getItem('user') || '{}');
  if (cached.prenom) document.getElementById('nav-username').textContent = cached.prenom + ' ' + cached.nom;

  document.getElementById('btn-logout').addEventListener('click', () => {
    localStorage.removeItem('jwt');
    localStorage.removeItem('user');
    window.location = 'login.html';
  });

  // Vérifie le token côté serveur et affiche les données fraîches
  (async () => {
    try {
      const res  = await fetch(`${API}/me.php`, {
        headers: { 'Authorization': `Bearer ${token}` },
      });
      const data = await res.json();

      if (!res.ok) {
        localStorage.removeItem('jwt');
        window.location = 'login.html';
        return;
      }

      const u = data.user;
      document.getElementById('nav-username').textContent = u.prenom + ' ' + u.nom;
      document.getElementById('user-info').innerHTML = `
        <dt class="col-5">Nom</dt>           <dd class="col-7">${esc(u.nom)}</dd>
        <dt class="col-5">Prénom</dt>        <dd class="col-7">${esc(u.prenom)}</dd>
        <dt class="col-5">Login</dt>         <dd class="col-7">${esc(u.login)}</dd>
        <dt class="col-5">Rôle</dt>         <dd class="col-7">${esc(u.role)}</dd>
        <dt class="col-5">Actif</dt>        <dd class="col-7">${u.actif ? 'Oui' : 'Non'}</dd>
        <dt class="col-5">Dernière co</dt> <dd class="col-7">${esc(u.date_derniere_connexion || '-')}</dd>
      `;

    } catch (e) {
      document.getElementById('alert').className = 'alert alert-danger';
      document.getElementById('alert').textContent = 'Erreur réseau.';
    }
  })();

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>

</body>
</html>

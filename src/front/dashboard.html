<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>

<nav class="navbar navbar-light bg-white border-bottom px-4">
  <span class="navbar-brand mb-0 h6" id="nav-username">Chargement…</span>
  <button class="btn btn-sm btn-outline-secondary" id="btn-logout">Déconnexion</button>
</nav>

<div class="container-fluid mt-5">
  <div id="alert" class="alert alert-danger d-none"></div>

  <div class="row mb-4">
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h6 class="card-title mb-3">Mon compte</h6>
          <dl class="row mb-0" id="user-info">
            <dd class="col-12 text-muted">Chargement…</dd>
          </dl>
        </div>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="col-12">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h6 class="card-title mb-3">Gestion des utilisateurs</h6>
          <div class="table-responsive">
            <table class="table table-hover" id="users-table">
              <thead>
                <tr>
                  <th>Nom</th>
                  <th>Prénom</th>
                  <th>Login</th>
                  <th>Rôle</th>
                  <th>Actif</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="users-tbody">
                <tr>
                  <td colspan="6" class="text-center text-muted">Chargement…</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal pour modifier un utilisateur -->
<div class="modal fade" id="editUserModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Modifier utilisateur</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="editUserForm">
          <input type="hidden" id="editUserId">
          <div class="mb-3">
            <label for="editNom" class="form-label">Nom</label>
            <input type="text" class="form-control" id="editNom" required>
          </div>
          <div class="mb-3">
            <label for="editPrenom" class="form-label">Prénom</label>
            <input type="text" class="form-control" id="editPrenom" required>
          </div>
          <div class="mb-3">
            <label for="editLogin" class="form-label">Login</label>
            <input type="text" class="form-control" id="editLogin" disabled>
          </div>
          <div class="mb-3">
            <label for="editRole" class="form-label">Rôle</label>
            <input type="text" class="form-control" id="editRole" disabled>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
        <button type="button" class="btn btn-primary" id="saveUserBtn">Enregistrer</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
  const API = '../api';
  const token = localStorage.getItem('jwt');
  if (!token) window.location = 'login.html';

  // Pré-rempli depuis le localStorage (évite un flash)
  const cached = JSON.parse(localStorage.getItem('user') || '{}');
  if (cached.prenom) document.getElementById('nav-username').textContent = cached.prenom + ' ' + cached.nom;

  document.getElementById('btn-logout').addEventListener('click', () => {
    localStorage.removeItem('jwt');
    localStorage.removeItem('user');
    window.location = 'login.html';
  });

  // Vérifie le token côté serveur et affiche les données fraîches
  (async () => {
    try {
      const res = await fetch(`${API}/user/me.php`, {
        headers: { 'Authorization': `Bearer ${token}` },
      });
      const data = await res.json();

      if (!res.ok) {
        localStorage.removeItem('jwt');
        window.location = 'login.html';
        return;
      }

      const u = data.user;
      document.getElementById('nav-username').textContent = u.prenom + ' ' + u.nom;
      document.getElementById('user-info').innerHTML = `
        <dt class="col-5">Nom</dt>           <dd class="col-7">${esc(u.nom)}</dd>
        <dt class="col-5">Prénom</dt>        <dd class="col-7">${esc(u.prenom)}</dd>
        <dt class="col-5">Login</dt>         <dd class="col-7">${esc(u.login)}</dd>
        <dt class="col-5">Rôle</dt>         <dd class="col-7">${esc(u.role)}</dd>
        <dt class="col-5">Actif</dt>        <dd class="col-7">${u.actif ? 'Oui' : 'Non'}</dd>
        <dt class="col-5">Dernière co</dt> <dd class="col-7">${esc(u.date_derniere_connexion || '-')}</dd>
      `;

      // Charge la liste des utilisateurs
      loadUsers();

    } catch (e) {
      showAlert('Erreur réseau.');
      console.error(e);
    }
  })();

  // Fonction pour échapper les caractères HTML
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Afficher une alerte
  function showAlert(msg, type = 'danger') {
    const alert = document.getElementById('alert');
    alert.className = `alert alert-${type}`;
    alert.textContent = msg;
    setTimeout(() => alert.classList.add('d-none'), 5000);
  }

  // Charger la liste des utilisateurs
  async function loadUsers() {
    try {
      const res = await fetch(`${API}/admin/users.php`, {
        headers: { 'Authorization': `Bearer ${token}` },
      });
      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.message || 'Erreur lors du chargement');
      }

      const tbody = document.getElementById('users-tbody');
      tbody.innerHTML = '';

      if (!data.data || data.data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">Aucun utilisateur</td></tr>';
        return;
      }

      data.data.forEach(user => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${esc(user.nom)}</td>
          <td>${esc(user.prenom)}</td>
          <td>${esc(user.login)}</td>
          <td>${esc(user.role)}</td>
          <td>
            <div class="form-check">
              <input class="form-check-input user-toggle" type="checkbox" data-user-id="${user.id}" 
                     ${user.actif ? 'checked' : ''}>
            </div>
          </td>
          <td>
            <button class="btn btn-sm btn-warning edit-user-btn" data-user-id="${user.id}" 
                    data-nom="${esc(user.nom)}" data-prenom="${esc(user.prenom)}"
                    data-login="${esc(user.login)}" data-role="${esc(user.role)}">
              Modifier
            </button>
          </td>
        `;
        tbody.appendChild(row);
      });

      // Ajoute les événements
      document.querySelectorAll('.user-toggle').forEach(checkbox => {
        checkbox.addEventListener('change', toggleUserStatus);
      });

      document.querySelectorAll('.edit-user-btn').forEach(btn => {
        btn.addEventListener('click', openEditModal);
      });

    } catch (e) {
      showAlert('Erreur lors du chargement des utilisateurs');
      console.error(e);
    }
  }

  // Basculer le statut d'un utilisateur
  async function toggleUserStatus(event) {
    const checkbox = event.target;
    const userId = checkbox.dataset.userId;
    const action = checkbox.checked ? 'activate' : 'deactivate';

    try {
      const res = await fetch(`${API}/admin/toggle-status.php?id=${userId}`, {
        method: 'PATCH',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ action })
      });

      const data = await res.json();

      if (!res.ok) {
        checkbox.checked = !checkbox.checked; // Annule le changement
        throw new Error(data.message || 'Erreur');
      }

      showAlert(data.message, 'success');

    } catch (e) {
      checkbox.checked = !checkbox.checked;
      showAlert('Erreur lors de la mise à jour');
      console.error(e);
    }
  }

  // Ouvrir le modal d'édition
  function openEditModal(event) {
    const btn = event.target;
    const userId = btn.dataset.userId;

    document.getElementById('editUserId').value = userId;
    document.getElementById('editNom').value = btn.dataset.nom;
    document.getElementById('editPrenom').value = btn.dataset.prenom;
    document.getElementById('editLogin').value = btn.dataset.login;
    document.getElementById('editRole').value = btn.dataset.role;

    const modal = new bootstrap.Modal(document.getElementById('editUserModal'));
    modal.show();
  }

  // Sauvegarder l'utilisateur
  document.getElementById('saveUserBtn').addEventListener('click', async () => {
    const userId = document.getElementById('editUserId').value;
    const nom = document.getElementById('editNom').value;
    const prenom = document.getElementById('editPrenom').value;

    try {
      const res = await fetch(`${API}/admin/users.php?id=${userId}`, {
        method: 'PUT',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ nom, prenom })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.message || 'Erreur');
      }

      bootstrap.Modal.getInstance(document.getElementById('editUserModal')).hide();
      showAlert(data.message, 'success');
      loadUsers();

    } catch (e) {
      showAlert('Erreur lors de la sauvegarde');
      console.error(e);
    }
  });
</script>

</body>
</html>

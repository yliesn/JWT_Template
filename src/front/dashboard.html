<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>

<nav class="navbar navbar-light bg-white border-bottom px-4">
  <span class="navbar-brand mb-0 h6" id="nav-username">Chargement…</span>
  <button class="btn btn-sm btn-outline-secondary" id="btn-logout">Déconnexion</button>
</nav>

<div class="container-fluid mt-5">

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
  const API = '../api';
  const token = localStorage.getItem('jwt');
  if (!token) window.location = 'login.html';

  const cached = JSON.parse(localStorage.getItem('user') || '{}');
  if (cached.first_name) document.getElementById('nav-username').textContent = cached.first_name + ' ' + cached.last_name;

  document.getElementById('btn-logout').addEventListener('click', () => {
    localStorage.removeItem('jwt');
    localStorage.removeItem('user');
    window.location = 'login.html';
  });

  (async () => {
    try {
      const res = await fetch(`${API}/user/me.php`, {
        headers: { 'Authorization': `Bearer ${token}` },
      });
      const data = await res.json();

      if (!res.ok) {
        localStorage.removeItem('jwt');
        window.location = 'login.html';
        return;
      }

      const u = data.user;
      document.getElementById('nav-username').textContent = u.first_name + ' ' + u.last_name;

    } catch (e) {
      console.error(e);
    }
  })();
</script>

</body>
</html>

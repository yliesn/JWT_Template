<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inscription</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { background: #f5f5f5; }
    .card { max-width: 420px; margin: 80px auto; }
  </style>
</head>
<body>

<div class="card shadow-sm">
  <div class="card-body p-4">
    <h5 class="card-title mb-4">Inscription</h5>

    <div id="alert" class="alert d-none" role="alert"></div>

    <div class="row mb-3">
      <div class="col">
        <label for="nom" class="form-label">Nom</label>
        <input type="text" id="nom" class="form-control">
      </div>
      <div class="col">
        <label for="prenom" class="form-label">Prénom</label>
        <input type="text" id="prenom" class="form-control">
      </div>
    </div>

    <div class="mb-3">
      <label for="login" class="form-label">Login</label>
      <input type="text" id="login" class="form-control" autocomplete="username">
    </div>

    <div class="mb-3">
      <label for="password" class="form-label">Mot de passe</label>
      <input type="password" id="password" class="form-control" autocomplete="new-password">
      <div class="form-text">8 caractères minimum.</div>
    </div>

    <div class="mb-4">
      <label for="password2" class="form-label">Confirmer le mot de passe</label>
      <input type="password" id="password2" class="form-control" autocomplete="new-password">
    </div>

    <button id="btn-register" class="btn btn-dark w-100">Créer le compte</button>
    <div class="text-center mt-3">
      <a href="login.html" class="text-muted small">Déjà un compte ? Se connecter</a>
    </div>
  </div>
</div>

<script>
  const API = '../api';

  if (localStorage.getItem('jwt')) window.location = 'dashboard.html';

  document.getElementById('btn-register').addEventListener('click', async () => {
    const nom     = document.getElementById('nom').value.trim();
    const prenom  = document.getElementById('prenom').value.trim();
    const login   = document.getElementById('login').value.trim();
    const mdp     = document.getElementById('password').value;
    const mdp2    = document.getElementById('password2').value;

    if (!nom || !prenom || !login || !mdp || !mdp2) {
      showAlert('Tous les champs sont obligatoires.', 'warning');
      return;
    }

    if (mdp !== mdp2) {
      showAlert('Les mots de passe ne correspondent pas.', 'warning');
      return;
    }

    if (mdp.length < 8) {
      showAlert('Le mot de passe doit faire au moins 8 caractères.', 'warning');
      return;
    }

    try {
      const res  = await fetch(`${API}/register.php`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nom, prenom, login, mot_de_passe: mdp }),
      });
      const data = await res.json();

      if (!res.ok) {
        showAlert(data.error || 'Erreur lors de la création du compte.', 'danger');
        return;
      }

      showAlert('Compte créé ! Redirection…', 'success');
      setTimeout(() => window.location = 'login.html', 1500);

    } catch (e) {
      showAlert('Impossible de contacter le serveur.', 'danger');
    }
  });

  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.className = `alert alert-${type}`;
    el.textContent = msg;
  }
</script>

</body>
</html>
